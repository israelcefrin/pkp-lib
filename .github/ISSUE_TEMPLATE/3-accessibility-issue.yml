name: Accessibility Issue
description: File an accessibility issue in OJS, OMP, or OPS.
title: "[A11Y]: "
labels: ["Accessibility"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve accessibility! Include as much detail as you can below.
        

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the accessibility issue?
    validations:
      required: true
  
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can someone else reproduce this issue?
      placeholder: |
        1. Navigate to [URL]
        2. Tab to the search input
        3. Observe that...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Application and version
      description: What application are you using?
      placeholder: "e.g., OJS version 3.5.0-1"
    validations:
      required: true

  - type: textarea
    id: action
    attributes:
      label: Action
      description: Describe action that can be taken to remediate the issue. 
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Screenshots, recordings, code snippets, OS, browser version or audit findings
    validations:
      required: false
